<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Agent AI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            color: #58a6ff;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        button {
            background-color: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #2ea043;
        }

        #result-box {
            margin-top: 20px;
            padding: 15px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            display: none;
        }

        pre {
            color: #7ee787;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .badge-success {
            background: #1f6feb;
            color: white;
        }

        .badge-warning {
            background: #d29922;
            color: white;
        }
    </style>
</head>

<body>

    <h1>Guardian Agent Triage</h1>
    <p>Submit a bug report. The AI will categorize it and prioritize it. It is designed to self-heal if it makes a
        formatting mistake.</p>

    <textarea id="issueInput"
        placeholder="Describe the bug or feature request here... (e.g., 'The login screen crashes on iOS 15')"></textarea>
    <br>
    <button id="submitBtn" onclick="analyzeIssue()">Analyze Issue</button>

    <div id="result-box">
        <div id="attempt-badge" class="badge badge-success"></div>
        <strong>AI Output:</strong>
        <pre id="jsonOutput"></pre>
    </div>

    <script>
        async function analyzeIssue() {
            const issue = document.getElementById('issueInput').value;
            const btn = document.getElementById('submitBtn');
            const resultBox = document.getElementById('result-box');
            const jsonOutput = document.getElementById('jsonOutput');
            const badge = document.getElementById('attempt-badge');

            if (!issue) return alert("Please enter an issue!");

            btn.innerText = "Thinking & Validating...";
            btn.disabled = true;
            resultBox.style.display = "none";

            try {
                // Send the text to our Node.js backend
                const response = await fetch('/api/triage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ issue: issue })
                });

                const data = await response.json();

                // Display the results
                jsonOutput.innerText = JSON.stringify(data.result, null, 2);

                // Show how many attempts it took (proving the self-healing!)
                if (data.attempts > 1) {
                    badge.className = "badge badge-warning";
                    badge.innerText = `Self-Healed! Took ${data.attempts} attempts.`;
                } else {
                    badge.className = "badge badge-success";
                    badge.innerText = `Perfect on Attempt 1`;
                }

                resultBox.style.display = "block";
            } catch (error) {
                alert("Something went wrong!");
            } finally {
                btn.innerText = "Analyze Issue";
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
